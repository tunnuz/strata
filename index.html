<!DOCTYPE html>
<html>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

<!-- Disable zooming: -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<head>
    <title>Strata</title>
    <link rel="icon" href="./icon.png"/>
    <style>
        html { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; }
        body { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
<link rel="modulepreload" href="./strata.js" crossorigin="anonymous"><link rel="preload" href="./strata.wasm" crossorigin="anonymous" as="fetch" type="application/wasm"></head>

<body>
    <canvas id="the_canvas_id"></canvas>

<script type="module">
import init, * as bindings from './strata.js';
const wasm = await init({ module_or_path: './strata.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script></body>
</html>
